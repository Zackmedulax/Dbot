name: Run D-Bot

on:
  schedule:
    - cron: '0 */6 * * *'   
  workflow_dispatch:
  push:
    branches: [ main ]
    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 'lts/*'
        cache: 'npm'
        
    - name: Install yt-dlp & rclone
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip ffmpeg
        pip3 install --upgrade yt-dlp
        curl https://rclone.org/install.sh | sudo bash
        
    - name: Verify installations
      run: |
        echo "=== yt-dlp version ==="
        yt-dlp --version || echo "yt-dlp NOT FOUND"
        echo "=== rclone version ==="
        rclone --version || echo "rclone NOT FOUND"
        echo "=== ffmpeg version ==="
        ffmpeg -version | head -1 || echo "ffmpeg NOT FOUND"
        
    - name: Test yt-dlp connection
      run: |
        echo "=== Testing yt-dlp get-title ==="
        yt-dlp --get-title "https://youtu.be/dQw4w9WgXcQ" || echo "Get title failed"
        echo "=== Testing yt-dlp download (small) ==="
        yt-dlp -f 'best[height<=480]' -o - "https://youtu.be/dQw4w9WgXcQ" | wc -c || echo "Download failed"
        
    - name: Setup rclone config
      run: |
        mkdir -p ~/.config/rclone
        echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf
        echo "=== rclone config created ==="
        rclone listremotes || echo "No remotes found"
        
    - name: Test rclone connection
      run: |
        echo "=== Testing rclone connection ==="
        rclone ls YtDbot: --max-depth 1 2>&1 | head -10 || echo "Connection failed!"
        
    - name: Install dependencies
      run: npm ci
      
    - name: Create env file
      run: |
        echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> .env
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
    
    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: node main.js