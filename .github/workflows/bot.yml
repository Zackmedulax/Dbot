name: Run D-Bot 24/7

on:
  schedule:
    # Jalankan setiap 30 menit (bisa diubah)
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Bisa manual run dari GitHub
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Create env file
      run: |
        echo "TELEGRAM_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
        
    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: node main.js
      
    - name: Keep alive (biar ga mati)
      run: |
        while true; do
          sleep 60
        done
